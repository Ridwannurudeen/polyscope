server {
    listen 80;
    server_name polyscope.gudman.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name polyscope.gudman.xyz;

    # SSL certs managed by certbot
    ssl_certificate /etc/letsencrypt/live/polyscope.gudman.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/polyscope.gudman.xyz/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
