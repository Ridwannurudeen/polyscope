# PolyScope — US geoblock snippet (Phase C deployment).
#
# Include this from the HTTPS server block in
# /etc/nginx/sites-available/polyscope once Phase C ships.
#
# Prerequisites (one-time VPS setup):
#
#   1. Install the GeoIP database + nginx module:
#        apt install nginx-module-geoip2 libmaxminddb0 mmdb-bin
#        # Sign up for a free MaxMind account and place a GeoLite2-Country.mmdb
#        # under /var/lib/GeoIP/. An auto-update script (geoipupdate) keeps it
#        # fresh.
#
#   2. In /etc/nginx/nginx.conf (http block), add:
#        load_module modules/ngx_http_geoip2_module.so;
#        geoip2 /var/lib/GeoIP/GeoLite2-Country.mmdb {
#            $geoip2_country_code country iso_code;
#        }
#
# Behaviour
#   - Research surface (/, /markets, /smart-money, /traders, /methodology,
#     /calibration, /portfolio, /builder read-only, etc.) remains globally
#     accessible. These are public research — nothing to geoblock.
#   - Only the order-routing API paths are blocked for US IPs: posting
#     orders or fetching admin views. Regular browsing on the site is
#     unaffected.
#   - The frontend detects 451 responses on the trade path and disables
#     the Trade button with a "Not available in your region" tooltip.

map $geoip2_country_code $polyscope_is_us {
    default 0;
    "US"    1;
}

# Apply inside the `server { ... }` block for the HTTPS host:
#
#   include /opt/polyscope/deploy/nginx/geoblock.conf;
#
#   location = /api/orders/place   { if ($polyscope_is_us) { return 451; } proxy_pass http://127.0.0.1:8021; }
#   location = /api/orders/recent  { if ($polyscope_is_us) { return 451; } proxy_pass http://127.0.0.1:8021; }
#   location = /api/orders/config  { if ($polyscope_is_us) { return 451; } proxy_pass http://127.0.0.1:8021; }
#
# 451 = "Unavailable For Legal Reasons" (RFC 7725). Correct code for
# geographic legal restrictions; browsers and proxies handle it cleanly.
