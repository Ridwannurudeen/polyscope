services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8020:8020"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3020:3020"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8020
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - .env
    environment:
      - POLYSCOPE_API_URL=http://api:8020
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
